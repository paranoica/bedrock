name: evals
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # The same single command a contributor runs locally. Fails the build on any contract drift
      # or seam regression — so "blocking on our evals" means blocking, not advisory.
      - run: bash tools/run-evals.sh
