name: Question
description: Ask about usage, the spec, or how something works.
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Be specific. If it's about behaviour, link the file/decision/task involved.
    validations:
      required: true
  - type: checkboxes
    id: checked-docs
    attributes:
      label: Checked first
      options:
        - label: I read the relevant `docs/` and `.template/INSTRUCTIONS.*`.
